<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chá de Fraldas da Laís 🍼</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --pink:       #f7b8cb;
    --pink-dark:  #e88fa8;
    --lilac:      #d4b8e0;
    --lilac-dark: #b899cc;
    --text:       #6b4f72;
    --text-light: #a07ab0;
    --shadow:     rgba(180,120,160,.25);
    --shadow-deep:rgba(160,100,140,.35);
    /* festa junina accent — warm amber, very subtle */
    --junina:     rgba(220,160,80,.18);
    --junina-mid: rgba(200,130,60,.28);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    width:100vw; height:100vh; overflow:hidden;
    background:linear-gradient(135deg,#fde8ef 0%,#f0e8f7 30%,#e8f0fd 60%,#fde8ef 100%);
    background-size:400% 400%;
    animation:bgShift 12s ease infinite;
    font-family:'Nunito',sans-serif;
  }
  @keyframes bgShift {
    0%,100%{ background-position:0% 50%; }
    50%    { background-position:100% 50%; }
  }

  #stars-canvas { position:fixed; inset:0; pointer-events:none; z-index:0; }

  /* ── Bandeirinhas SVG fixed to top of screen ── */
  .bunting {
    position:fixed; top:0; left:0; width:100%; z-index:2;
    pointer-events:none; overflow:visible;
  }

  /* ── Fogueira SVG fixed bottom-left, very subtle ── */
  .bonfire {
    position:fixed; bottom:0; left:24px;
    z-index:2; pointer-events:none;
    opacity:.22;
  }
  .bonfire .flame {
    transform-origin: 50% 100%;
    animation: flicker 1.8s ease-in-out infinite alternate;
  }
  .bonfire .flame2 { animation-delay:.4s; animation-duration:1.4s; }
  .bonfire .flame3 { animation-delay:.9s; animation-duration:2.1s; }
  @keyframes flicker {
    0%  { transform:scaleX(1)   scaleY(1)   rotate(-2deg); opacity:.9; }
    50% { transform:scaleX(.92) scaleY(1.08) rotate(2deg);  opacity:1; }
    100%{ transform:scaleX(1.05)scaleY(.95)  rotate(-1deg); opacity:.85; }
  }

  /* ── Floating bg decos — mix bebê + junina ── */
  .bg-deco {
    position:fixed; pointer-events:none; z-index:1;
    opacity:.15; animation:floatDeco linear infinite;
  }
  @keyframes floatDeco {
    0%  { transform:translateY(110vh) rotate(0deg);   opacity:0; }
    10% { opacity:.15; }
    90% { opacity:.15; }
    100%{ transform:translateY(-10vh) rotate(360deg); opacity:0; }
  }

  .hint {
    position:fixed; bottom:28px; left:50%;
    transform:translateX(-50%);
    color:var(--text-light); font-size:.85rem; font-weight:600;
    letter-spacing:.05em; white-space:nowrap;
    animation:hintBounce 2s ease-in-out infinite;
    z-index:50; pointer-events:none; transition:opacity .5s;
  }
  @keyframes hintBounce {
    0%,100%{ transform:translateX(-50%) translateY(0); }
    50%    { transform:translateX(-50%) translateY(-6px); }
  }

  /* ═══════════════════════════════════
     ENVELOPE
  ═══════════════════════════════════ */
  .envelope-wrapper {
    position:fixed; top:50%; left:50%;
    transform:translate(-50%,-50%);
    z-index:30; cursor:pointer;
    filter:drop-shadow(0 16px 36px var(--shadow-deep));
    transition:filter .3s;
  }
  .envelope-wrapper:hover { filter:drop-shadow(0 20px 44px var(--shadow-deep)); }
  .envelope-wrapper:hover .env-body { transform:translateY(-4px) scale(1.015); }

  .env-body {
    width:340px; height:220px;
    background:linear-gradient(160deg,#fff0f6 0%,#fce4f0 50%,#f5d6e8 100%);
    border-radius:16px; position:relative;
    transition:transform .4s cubic-bezier(.34,1.56,.64,1);
    overflow:visible;
  }

  /* subtle junina pattern on envelope — tiny diagonal stripes, very low opacity */
  .env-body::after {
    content:''; position:absolute; inset:0; border-radius:16px;
    background:repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 12px,
      rgba(210,150,70,.07) 12px,
      rgba(210,150,70,.07) 13px
    );
    pointer-events:none;
  }

  .env-bottom {
    position:absolute; bottom:0; left:0; right:0; height:130px;
    background:linear-gradient(160deg,#f9cde0 0%,#edb8d1 100%);
    clip-path:polygon(0 100%,50% 0%,100% 100%);
    border-radius:0 0 16px 16px;
  }
  .env-left {
    position:absolute; top:0; left:0; width:170px; height:220px;
    background:linear-gradient(135deg,#fce4f0 0%,#f0c8e0 100%);
    clip-path:polygon(0 0,0 100%,100% 50%);
    border-radius:16px 0 0 16px;
  }
  .env-right {
    position:absolute; top:0; right:0; width:170px; height:220px;
    background:linear-gradient(225deg,#fce4f0 0%,#f0c8e0 100%);
    clip-path:polygon(100% 0,100% 100%,0 50%);
    border-radius:0 16px 16px 0;
  }
  .env-flap {
    position:absolute; top:-1px; left:-1px; right:-1px; height:130px;
    background:linear-gradient(160deg,#f8daea 0%,#e8b8d0 100%);
    clip-path:polygon(0 0,100% 0,50% 100%);
    border-radius:16px 16px 0 0;
    transform-origin:top center;
    transition:transform .7s cubic-bezier(.4,0,.2,1), background .3s;
    z-index:5; backface-visibility:hidden;
  }
  .env-flap.open {
    transform:rotateX(-180deg);
    background:linear-gradient(160deg,#e8b8d0 0%,#f8daea 100%);
  }
  .env-seal {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:56px; height:56px;
    background:radial-gradient(circle,#f7b8cb 0%,#e88fa8 60%,#d4769a 100%);
    border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:1.5rem;
    box-shadow:0 4px 16px rgba(200,100,140,.45),inset 0 -2px 4px rgba(0,0,0,.1);
    z-index:6; border:3px solid #fff;
    transition:transform .5s cubic-bezier(.34,1.56,.64,1), opacity .3s;
  }
  .env-seal.open { transform:translate(-50%,-50%) scale(0) rotate(180deg); opacity:0; }

  /* ═══════════════════════════════════
     CARD
  ═══════════════════════════════════ */
  .invite-card {
    position:fixed; top:50%; left:50%;
    transform:translate(-50%,-50%) scale(0.05);
    transform-origin:center center;
    z-index:5;
    visibility: hidden;
    width:320px;
    background:linear-gradient(160deg,#fff9fc 0%,#fef0f7 100%);
    border-radius:24px;
    padding:36px 24px 24px;
    box-shadow:0 0 0 8px rgba(247,184,203,.25), 0 20px 60px rgba(180,100,140,.4);
    border:2px solid rgba(247,184,203,.6);
    text-align:center;
    opacity:0; pointer-events:none;
    transition:transform .6s cubic-bezier(.34,1.25,.64,1), opacity .45s ease, visibility 0s linear .45s; /* clip the junina corner accents */
  }
  .invite-card.visible {
    transform:translate(-50%,-50%) scale(1);
    opacity:1; pointer-events:all;
    z-index:40;
    visibility: visible;
    transition:transform .6s cubic-bezier(.34,1.25,.64,1), opacity .45s ease, visibility 0s linear 0s;
  }

  /* subtle junina corner accent — small triangle in muted amber */
  .invite-card::before {
    content:''; position:absolute; top:0; right:0;
    width:0; height:0;
    border-top:40px solid rgba(215,160,75,.13);
    border-left:40px solid transparent;
    border-radius:0 22px 0 0;
  }
  .invite-card::after {
    content:''; position:absolute; bottom:0; left:0;
    width:0; height:0;
    border-bottom:40px solid rgba(215,160,75,.1);
    border-right:40px solid transparent;
    border-radius:0 0 0 22px;
  }

  /* ribbon */
  .card-ribbon {
    position:absolute; top:-14px; left:50%;
    transform:translateX(-50%);
    background:linear-gradient(90deg,var(--pink-dark),var(--lilac-dark),var(--pink-dark));
    background-size:200% auto;
    animation:ribbonShine 3s linear infinite;
    color:#fff; font-size:.7rem; font-weight:800;
    letter-spacing:.12em; padding:5px 20px;
    border-radius:20px; text-transform:uppercase;
    box-shadow:0 4px 12px rgba(200,120,160,.4);
    white-space:nowrap;
  }
  @keyframes ribbonShine {
    0%  { background-position:0% center; }
    100%{ background-position:200% center; }
  }

  /* mini bandeirinhas inside card — purely CSS, sits above content */
  .card-buntings {
    position:absolute; top:10px; left:0; right:0;
    height:18px; pointer-events:none; overflow:hidden;
  }
  .card-buntings svg { width:100%; height:18px; }

  .card-emojis { font-size:1.6rem; margin-bottom:4px; margin-top:8px; animation:emojiWiggle 3s ease-in-out infinite; }
  @keyframes emojiWiggle {
    0%,100%{ transform:scale(1); }
    50%    { transform:scale(1.1) rotate(3deg); }
  }

  .card-title {
    font-family:'Pacifico',cursive; font-size:1.5rem;
    color:var(--text); line-height:1.4; margin-bottom:14px;
    text-shadow:1px 1px 0 rgba(255,255,255,.8);
  }
  .card-title span { color:var(--pink-dark); display:block; font-size:1.85rem; }

  .divider {
    width:80px; height:3px;
    background:linear-gradient(90deg,var(--pink),var(--lilac),var(--pink));
    border-radius:2px; margin:0 auto 14px;
    animation:divPulse 2s ease-in-out infinite;
  }
  @keyframes divPulse {
    0%,100%{ width:80px; opacity:1; }
    50%    { width:100px; opacity:.7; }
  }

  .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
  .info-item {
    background:linear-gradient(135deg,rgba(255,255,255,.9) 0%,rgba(253,232,239,.6) 100%);
    border:1.5px solid rgba(247,184,203,.4);
    border-radius:14px; padding:10px 8px;
    transition:transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s;
  }
  .info-item:hover { transform:translateY(-3px) scale(1.03); box-shadow:0 8px 20px var(--shadow); }
  .info-item.full  { grid-column:1/-1; }

  .info-label {
    font-size:.62rem; font-weight:800; text-transform:uppercase;
    letter-spacing:.08em; color:var(--text-light); display:block; margin-bottom:2px;
  }
  .info-value { font-size:.88rem; font-weight:700; color:var(--text); line-height:1.3; }

  .location-link {
    display:inline-block; color:var(--text); text-decoration:none;
    border-bottom:1.5px dashed var(--pink-dark); transition:color .2s;
  }
  .location-link:hover { color:var(--pink-dark); }

  .diaper-box {
    background:linear-gradient(135deg,#fde9f4 0%,#f0e0f8 100%);
    border:2px dashed var(--lilac); border-radius:14px;
    padding:10px 12px; margin-bottom:12px;
    font-size:.82rem; color:var(--text); font-weight:600;
  }
  .diaper-box strong { color:var(--lilac-dark); }

  .special-msg {
    font-style:italic; font-size:.82rem;
    color:var(--text-light); font-weight:600;
    line-height:1.5; margin-bottom:14px;
  }

  .confirm-btn {
    display:inline-flex; align-items:center; gap:8px;
    background:linear-gradient(135deg,var(--pink-dark) 0%,var(--lilac-dark) 100%);
    color:#fff; font-family:'Nunito',sans-serif;
    font-weight:800; font-size:.85rem; border:none;
    padding:11px 22px; border-radius:30px; cursor:pointer;
    box-shadow:0 6px 20px rgba(200,120,160,.45);
    transition:transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s;
    text-decoration:none; letter-spacing:.03em;
  }
  .confirm-btn:hover  { transform:translateY(-3px) scale(1.04); box-shadow:0 10px 28px rgba(200,120,160,.6); }
  .confirm-btn:active { transform:scale(.97); }

  /* controls */
  .controls {
    position:fixed; bottom:20px; right:20px;
    display:flex; gap:10px; z-index:100;
    opacity:0; transition:opacity .5s 1s;
  }
  .controls.visible { opacity:1; }
  .ctrl-btn {
    width:42px; height:42px; border-radius:50%; border:none;
    background:rgba(255,255,255,.85); backdrop-filter:blur(10px);
    color:var(--text); font-size:1rem; cursor:pointer;
    box-shadow:0 4px 16px var(--shadow);
    transition:transform .25s cubic-bezier(.34,1.56,.64,1), background .2s;
  }
  .ctrl-btn:hover { transform:scale(1.15); background:#fff; }

  /* confetti */
  .confetti-piece {
    position:fixed; border-radius:2px;
    pointer-events:none; z-index:1000;
    animation:confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0%  { transform:translateY(-20px) rotate(0deg) scale(1); opacity:1; }
    80% { opacity:1; }
    100%{ transform:translateY(100vh) rotate(720deg) scale(.3); opacity:0; }
  }

  /* sparkles */
  .sparkle {
    position:fixed; pointer-events:none; z-index:200;
    font-size:1.2rem; animation:sparkleAnim .7s ease-out forwards;
  }
  @keyframes sparkleAnim {
    0%  { transform:scale(0) rotate(0deg); opacity:1; }
    50% { transform:scale(1.5) rotate(180deg); opacity:1; }
    100%{ transform:scale(0) rotate(360deg) translateY(-40px); opacity:0; }
  }

  @media (max-width:360px) {
    .env-body { width:290px; height:188px; }
    .env-left,.env-right { width:145px; height:188px; }
    .env-bottom,.env-flap { height:110px; }
    .invite-card { width:280px; }
  }
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<!-- Bandeirinhas no topo — SVG inline, cores pastéis suaves -->
<svg class="bunting" viewBox="0 0 1200 60" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <!-- cordão -->
  <path d="M0,10 Q100,30 200,12 Q300,28 400,10 Q500,28 600,12 Q700,28 800,10 Q900,28 1000,12 Q1100,28 1200,10"

  <!-- bandeirinhas: triângulos alternando pastéis -->
  <!-- col 1 -->
  <polygon points="80,10 100,40 120,10" fill="rgba(247,184,203,0.45)"/>
  <!-- col 2 -->
  <polygon points="180,14 200,44 220,14" fill="rgba(212,184,224,0.45)"/>
  <!-- col 3 -->
  <polygon points="280,10 300,40 320,10" fill="rgba(253,233,162,0.45)"/>
  <!-- col 4 -->
  <polygon points="380,12 400,42 420,12" fill="rgba(184,224,212,0.45)"/>
  <!-- col 5 -->
  <polygon points="480,10 500,40 520,10" fill="rgba(247,184,203,0.45)"/>
  <!-- col 6 -->
  <polygon points="580,14 600,44 620,14" fill="rgba(212,184,224,0.45)"/>
  <!-- col 7 -->
  <polygon points="680,10 700,40 720,10" fill="rgba(253,233,162,0.45)"/>
  <!-- col 8 -->
  <polygon points="780,12 800,42 820,12" fill="rgba(184,224,212,0.45)"/>
  <!-- col 9 -->
  <polygon points="880,10 900,40 920,10" fill="rgba(247,184,203,0.45)"/>
  <!-- col 10 -->
  <polygon points="980,14 1000,44 1020,14" fill="rgba(212,184,224,0.45)"/>
  <!-- col 11 -->
  <polygon points="1080,10 1100,40 1120,10" fill="rgba(253,233,162,0.45)"/>
</svg>

<!-- Fogueira canto inferior esquerdo — SVG muito sutil -->
<svg class="bonfire" viewBox="0 0 80 100" width="80" xmlns="http://www.w3.org/2000/svg">
  <!-- lenha -->
  <rect x="10" y="78" width="60" height="7" rx="3" fill="rgba(160,100,60,.6)"/>
  <rect x="20" y="72" width="40" height="6" rx="3" fill="rgba(140,85,50,.5)" transform="rotate(-8,40,75)"/>
  <!-- brasas -->
  <ellipse cx="40" cy="82" rx="22" ry="5" fill="rgba(220,120,50,.35)"/>
  <!-- chamas -->
  <ellipse class="flame" cx="40" cy="62" rx="12" ry="22" fill="rgba(232,143,100,.55)"/>
  <ellipse class="flame flame2" cx="34" cy="68" rx="8" ry="16" fill="rgba(247,184,120,.5)"/>
  <ellipse class="flame flame3" cx="46" cy="65" rx="7" ry="14" fill="rgba(247,210,130,.45)"/>
</svg>

<p class="hint" id="hint">✨ Clique no envelope para abrir ✨</p>

<!-- Envelope -->
<div class="envelope-wrapper" id="envelopeWrapper" onclick="openEnvelope()">
  <div class="env-body">
    <div class="env-left"></div>
    <div class="env-right"></div>
    <div class="env-bottom"></div>
    <div class="env-flap" id="envFlap"></div>
    <div class="env-seal" id="envSeal">🌸</div>
  </div>
</div>

<!-- Card -->
<div class="invite-card" id="inviteCard">
  <div class="card-ribbon">✨ Convite ✨</div>

  <!-- mini bandeirinhas dentro do card -->
  <div class="card-buntings">
    <svg viewBox="0 0 320 18" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,4 Q40,12 80,4 Q120,12 160,4 Q200,12 240,4 Q280,12 320,4"
            fill="none" stroke="rgba(200,150,180,0.3)" stroke-width="1"/>
      <polygon points="28,4 36,16 44,4"  fill="rgba(247,184,203,0.5)"/>
      <polygon points="76,5 84,17 92,5"  fill="rgba(212,184,224,0.5)"/>
      <polygon points="124,4 132,16 140,4" fill="rgba(253,233,162,0.5)"/>
      <polygon points="172,5 180,17 188,5" fill="rgba(184,224,212,0.5)"/>
      <polygon points="220,4 228,16 236,4" fill="rgba(247,184,203,0.5)"/>
      <polygon points="268,5 276,17 284,5" fill="rgba(212,184,224,0.5)"/>
    </svg>
  </div>

  <div class="card-emojis">🍼 👶 🌸 🔥 🌽</div>
  <h1 class="card-title">
    Charraiá de Fraldas
    <span>da Laís</span>
  </h1>
  <div class="divider"></div>
  <div class="info-grid">
    <div class="info-item">
      <span class="info-label">Data</span>
      <span class="info-value">27/06 · Sábado</span>
    </div>
    <div class="info-item">
      <span class="info-label">Horário</span>
      <span class="info-value">19 horas</span>
    </div>
    <div class="info-item full">
      <span class="info-label">Local</span>
      <a href="https://maps.app.goo.gl/7veaWjG94vFtg7Yd8" target="_blank"
         class="info-value location-link">Rua Gracco, nº 29 · Glória 📍</a>
    </div>
  </div>
  <div class="diaper-box" id="diaperBox">
    🧷 <strong>Sugestão de fralda:</strong><br>
    <span id="diaperSize">Fralda P</span> · Huggies ou Pampers
  </div>
  <p class="special-msg">
    Venha celebrar esse momento<br>tão especial com a gente! 💖
  </p>
  <a href="https://wa.me/5531988336148?text=Olá!%20Recebi%20o%20convite%20do%20Chá%20de%20Fraldas%20da%20Laís%20e%20gostaria%20de%20confirmar%20a%20minha%20presença!" target="_blank" class="confirm-btn">
    <i class="fab fa-whatsapp"></i> Confirmar Presença
  </a>
</div>

<!-- Controls -->
<div class="controls" id="controls">
  <button class="ctrl-btn" id="soundBtn" onclick="toggleSound()">🔊</button>
  <button class="ctrl-btn" onclick="resetInvite()">🔄</button>
</div>

<script>
let isOpen=false, audioCtx=null, soundEnabled=true, bgAudio=null;

/* ── Stars canvas ── */
(function(){
  const cv=document.getElementById('stars-canvas'),cx=cv.getContext('2d');
  let stars=[];
  const resize=()=>{ cv.width=innerWidth; cv.height=innerHeight; };
  const mkStar=()=>({
    x:Math.random()*cv.width, y:Math.random()*cv.height,
    r:Math.random()*2+.4, a:Math.random(),
    da:(Math.random()*.007+.002)*(Math.random()<.5?1:-1),
    c:['#f7b8cb','#d4b8e0','#b8d4e0','#fde9a2','#f5d09a'][0|Math.random()*5]
  });
  function draw(){
    cx.clearRect(0,0,cv.width,cv.height);
    stars.forEach(s=>{
      s.a+=s.da; if(s.a<=0||s.a>=1)s.da*=-1;
      cx.save(); cx.globalAlpha=s.a*.55; cx.fillStyle=s.c;
      cx.beginPath(); cx.arc(s.x,s.y,s.r,0,Math.PI*2); cx.fill(); cx.restore();
    });
    requestAnimationFrame(draw);
  }
  addEventListener('resize',resize);
  resize(); stars=Array.from({length:80},mkStar); draw();
})();

/* ── Floating decos — mix bebê + junina ── */
(function(){
  const em=['🍼','🧸','🎀','💕','🌸','✨','💫','🧷','👶','🎪','🌽','⭐'];
  const spawn=()=>{
    const el=document.createElement('div'); el.className='bg-deco';
    el.textContent=em[0|Math.random()*em.length];
    el.style.left=(Math.random()*100)+'vw';
    const d=12+Math.random()*16;
    el.style.animationDuration=d+'s';
    el.style.fontSize=(1+Math.random()*1.4)+'rem';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),d*1000+500);
  };
  setInterval(spawn,2000);
  for(let i=0;i<5;i++) setTimeout(spawn,i*500);
})();

/* ── Confetti ── */
function launchConfetti(){
  const cols=['#f7b8cb','#d4b8e0','#b8d4e0','#fde9a2','#e88fa8','#b899cc','#f5c87a','#fff'];
  for(let i=0;i<120;i++) setTimeout(()=>{
    const el=document.createElement('div'); el.className='confetti-piece';
    const c=cols[0|Math.random()*cols.length], r=Math.random();
    el.style.left=(20+Math.random()*60)+'vw'; el.style.top='-20px';
    if(r<.33){
      el.style.background=c; el.style.borderRadius='50%';
      el.style.width=el.style.height=(6+Math.random()*8)+'px';
    } else if(r<.66){
      el.style.background=c;
      el.style.width=el.style.height=(6+Math.random()*8)+'px';
    } else {
      /* triangle — like mini bandeirinha */
      el.style.width='0'; el.style.height='0'; el.style.background='transparent';
      el.style.borderLeft='6px solid transparent'; el.style.borderRight='6px solid transparent';
      el.style.borderBottom='11px solid '+c;
    }
    const d=2+Math.random()*2.5;
    el.style.animationDuration=d+'s'; el.style.animationDelay=(Math.random()*.5)+'s';
    document.body.appendChild(el); setTimeout(()=>el.remove(),(d+1)*1000);
  },i*18);
}

/* ── Sparkles ── */
function spawnSparkles(x,y){
  ['✨','💖','🌸','⭐','💫'].forEach(s=>{
    const el=document.createElement('div'); el.className='sparkle';
    el.textContent=s;
    el.style.left=(x-20+Math.random()*40)+'px';
    el.style.top =(y-20+Math.random()*40)+'px';
    el.style.animationDelay=(Math.random()*.3)+'s';
    document.body.appendChild(el); setTimeout(()=>el.remove(),900);
  });
}
document.getElementById('envelopeWrapper').addEventListener('click',e=>{
  if(!isOpen) spawnSparkles(e.clientX,e.clientY);
});

/* ── Audio ── */
function initAudio(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); }
function playOpenSound(){
  if(!soundEnabled) return; initAudio();
  [0,.05,.15,.3,.5,.7].forEach((t,i)=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type='sine'; o.frequency.value=[440,550,660,880,1100,1320][i];
    const n=audioCtx.currentTime;
    g.gain.setValueAtTime(0,n+t);
    g.gain.linearRampToValueAtTime(.18,n+t+.05);
    g.gain.exponentialRampToValueAtTime(.001,n+t+.4);
    o.start(n+t); o.stop(n+t+.5);
  });
}
function playBgMusic(){
  if(!soundEnabled) return;
  if(!bgAudio){ bgAudio=new Audio('musica.mp3'); bgAudio.loop=true; bgAudio.volume=.3; }
  bgAudio.play().catch(()=>{});
}
function stopBgMusic(){
  if(bgAudio){ bgAudio.pause(); bgAudio.currentTime=0; }
}
function toggleSound(){
  soundEnabled=!soundEnabled;
  const b=document.getElementById('soundBtn');
  if(soundEnabled){ initAudio(); b.textContent='🔊'; if(isOpen) playBgMusic(); }
  else            { b.textContent='🔇'; stopBgMusic(); }
}
(function(){
  const onFirst=()=>{
    initAudio(); if(audioCtx?.state==='suspended') audioCtx.resume();
    document.removeEventListener('click',onFirst);
    document.removeEventListener('touchstart',onFirst);
  };
  document.addEventListener('click',onFirst);
  document.addEventListener('touchstart',onFirst);
})();

/* ── Open ── */
function openEnvelope(){
  if(isOpen) return;
  isOpen=true;
  document.getElementById('envelopeWrapper').style.cursor='default';
  document.getElementById('envFlap').classList.add('open');
  document.getElementById('envSeal').classList.add('open');
  playOpenSound();
  setTimeout(()=>document.getElementById('inviteCard').classList.add('visible'),350);
  setTimeout(launchConfetti,520);
  const hint=document.getElementById('hint');
  hint.style.opacity='0'; setTimeout(()=>hint.style.display='none',600);
  document.getElementById('controls').classList.add('visible');
  setTimeout(playBgMusic,900);
  try{ localStorage.setItem('cha_lais_opened','1'); }catch(e){}
}

/* ── Reset ── */
function resetInvite(){
  isOpen=false;
  document.getElementById('inviteCard').classList.remove('visible');
  document.getElementById('envFlap').classList.remove('open');
  document.getElementById('envSeal').classList.remove('open');
  document.getElementById('envelopeWrapper').style.cursor='pointer';
  const hint=document.getElementById('hint');
  hint.style.display=''; setTimeout(()=>hint.style.opacity='1',50);
  stopBgMusic();
  if(soundEnabled) document.getElementById('soundBtn').textContent='🔊';
  try{ localStorage.removeItem('cha_lais_opened'); }catch(e){}
}

/* ── Init ── */
try{ if(localStorage.getItem('cha_lais_opened')==='1')
  document.getElementById('hint').textContent='✨ Clique para reabrir ✨';
}catch(e){}

/* ── Pausa música ao sair do app, retoma ao voltar ── */
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    if (bgAudio && !bgAudio.paused) bgAudio.pause();
  } else {
    if (isOpen && soundEnabled && bgAudio) bgAudio.play().catch(()=>{});
  }
});
(function(){
  const allowed=['RN','P','M','G','XG'];
  const param=new URLSearchParams(window.location.search).get('fralda');
  const size=allowed.includes((param||'').toUpperCase())?param.toUpperCase():'P';
  document.getElementById('diaperSize').textContent='Fralda '+size;
})();
</script>
